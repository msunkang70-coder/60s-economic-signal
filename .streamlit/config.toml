# .streamlit/config.toml
# Streamlit Cloud + Docker + 로컬 공통 설정

[server]
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#5B5FEE"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F4FF"
textColor = "#1e293b"
font = "sans serif"

[runner]
fastReruns = true
